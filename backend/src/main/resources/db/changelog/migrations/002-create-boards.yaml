databaseChangeLog:
  - changeSet:
      id: 002-create-boards
      author: sophiasuga
      changes:
        - createTable:
            tableName: boards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: NVARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_boards_owner
                    references: users(id)
              - column:
                  name: created_at
                  type: DATETIME2
                  defaultValueComputed: GETDATE()
                  constraints:
                    nullable: false
