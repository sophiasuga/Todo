databaseChangeLog:
  - changeSet:
      id: 008-create-board-members
      author: sophiasuga
      changes:
        - createTable:
            tableName: board_members
            columns:
              - column:
                  name: board_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_board_members_board
                    references: boards(id)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_board_members_user
                    references: users(id)
              - column:
                  name: role
                  type: NVARCHAR(20)
                  defaultValue: MEMBER
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: DATETIME2
                  defaultValueComputed: GETDATE()
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: board_members
            columnNames: board_id, user_id
            constraintName: pk_board_members
