databaseChangeLog:
  - changeSet:
      id: 004-create-cards
      author: sophiasuga
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: column_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cards_column
                    references: board_columns(id)
              - column:
                  name: title
                  type: NVARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: NVARCHAR(MAX)
              - column:
                  name: position
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: created_at
                  type: DATETIME2
                  defaultValueComputed: GETDATE()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME2
                  defaultValueComputed: GETDATE()
                  constraints:
                    nullable: false
