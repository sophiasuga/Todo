databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: sophiasuga
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: NVARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: NVARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: NVARCHAR(100)
              - column:
                  name: created_at
                  type: DATETIME2
                  defaultValueComputed: GETDATE()
                  constraints:
                    nullable: false
