databaseChangeLog:
  - changeSet:
      id: 003-create-board-columns
      author: sophiasuga
      changes:
        - createTable:
            tableName: board_columns
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: board_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_columns_board
                    references: boards(id)
              - column:
                  name: title
                  type: NVARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: NVARCHAR(20)
