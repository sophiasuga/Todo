databaseChangeLog:
  - changeSet:
      id: 011-create-todos
      author: sophiasuga
      changes:
        - createTable:
            tableName: todos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: NVARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: completed
                  type: BIT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME2
                  defaultValueComputed: GETDATE()
                  constraints:
                    nullable: false
